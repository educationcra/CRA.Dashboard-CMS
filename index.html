<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ | CRA Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Google Sans', 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }
    .glass-card { background: #ffffff; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
  </style>

  <script>
    // ⚠️ นำ URL ของ Web App ที่ Deploy ใหม่มาใส่ตรงนี้ ⚠️
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPSNCB1UBLRiTDtktn_lG8vr4zESTvUjrb44J6yhu5qMQ3jw4J-7E7UCctRcQdHPKcnQ/exec"; 
  </script>
</head>
<body class="flex items-center justify-center h-screen px-4">
  
  <div class="glass-card w-full max-w-md p-8 md:p-10" id="mainCard">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl font-black mb-4 shadow-lg shadow-indigo-200">CRA</div>
      <h2 id="formTitle" class="text-2xl font-black text-slate-800 tracking-tight">เข้าสู่ระบบ CMS</h2>
      <p id="formSubtitle" class="text-sm text-slate-500 mt-2 font-medium">จัดการแผงควบคุมสถิติของคุณ</p>
    </div>
    
    <div class="space-y-4">
      <div id="step1-inputs">
        <input type="email" id="email" placeholder="อีเมล" class="auth-input w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition mb-4 font-medium">
        <input type="text" id="username" placeholder="ชื่อที่จะแสดงในระบบ" class="auth-input hidden w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition mb-4 font-medium">
        <input type="password" id="password" placeholder="รหัสผ่าน" class="auth-input w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition font-medium">
        
        <div id="authMethodZone" class="hidden mt-4 pt-4 border-t border-slate-100">
           <p class="text-xs font-bold text-slate-500 mb-2">เลือกวิธีรับรหัส 2FA ในอนาคต:</p>
           <div class="flex gap-4">
              <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                <input type="radio" name="auth_method" value="email" checked class="accent-indigo-600"> ผ่านอีเมล
              </label>
              <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                <input type="radio" name="auth_method" value="authenticator" class="accent-indigo-600"> แอป Authenticator
              </label>
           </div>
        </div>
      </div>

      <div id="step2-inputs" class="hidden">
        <div id="step2-message" class="bg-indigo-50 text-indigo-700 p-3 rounded-xl text-sm font-medium mb-4 text-center border border-indigo-100">
          กรุณากรอกรหัสความปลอดภัย
        </div>
        <input type="text" id="otp-input" inputmode="numeric" maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="กรอกรหัส 6 หลัก" class="auth-input w-full p-3.5 bg-white border-2 border-indigo-300 rounded-xl outline-none focus:border-indigo-600 text-center text-lg font-black tracking-widest transition">
      </div>
      
      <button onclick="handleAuth()" id="authBtn" class="w-full p-4 bg-[#0a2240] text-white font-bold rounded-xl hover:bg-slate-800 shadow-md transition-all mt-2">เข้าสู่ระบบ</button>
      
      <div class="text-center pt-4 border-t border-slate-100 mt-6" id="toggleZone">
        <span id="toggleText" class="text-sm text-slate-500 font-medium">ยังไม่มีบัญชีใช่หรือไม่?</span> 
        <button onclick="toggleForm()" class="text-indigo-600 font-bold hover:underline text-sm ml-1">สมัครสมาชิก</button>
      </div>
    </div>
  </div>

  <div class="glass-card w-full max-w-md p-8 md:p-10 hidden" id="qrCard">
     <div class="text-center">
        <h2 class="text-2xl font-black text-slate-800 mb-2">ผูกบัญชี Authenticator</h2>
        <p class="text-sm text-slate-500 font-medium mb-6">สแกน QR Code เพื่อเปิดใช้งานรหัส 2FA</p>
        <div class="flex justify-center mb-6"><img id="qrImage" src="" alt="QR Code" class="border-4 border-white shadow-md rounded-xl"></div>
        <p class="text-xs text-slate-400 mb-6">Secret Key: <br><b class="text-indigo-600 tracking-wider text-sm select-all" id="secretText"></b></p>
        <button onclick="backToLogin()" class="w-full p-4 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 shadow-md">สแกนเสร็จแล้ว ไปเข้าสู่ระบบ</button>
     </div>
  </div>

  <script>
    let isLogin = true; let step = 1; 

    // เช็คว่าถ้ามี Email อยู่ใน LocalStorage แล้ว ให้เด้งไปหน้า CMS เลย
    if (localStorage.getItem('user_email')) {
       window.location.href = "cms.html";
    }

    document.querySelectorAll('.auth-input').forEach(input => {
        input.addEventListener('keypress', function(e) { if (e.key === 'Enter') handleAuth(); });
    });

    function toggleForm() {
      isLogin = !isLogin;
      document.getElementById('formTitle').innerText = isLogin ? 'เข้าสู่ระบบ CMS' : 'สมัครใช้งานระบบ';
      document.getElementById('authBtn').innerText = isLogin ? 'เข้าสู่ระบบ' : 'ลงทะเบียน';
      document.getElementById('toggleText').innerText = isLogin ? 'ยังไม่มีบัญชีใช่หรือไม่?' : 'มีบัญชีอยู่แล้ว?';
      document.getElementById('authMethodZone').style.display = isLogin ? 'none' : 'block';
      if(isLogin) document.getElementById('username').classList.add('hidden');
      else document.getElementById('username').classList.remove('hidden');
    }

    function backToLogin() {
      document.getElementById('qrCard').classList.add('hidden');
      document.getElementById('mainCard').classList.remove('hidden');
      if (!isLogin) toggleForm();
    }

    // สร้างฟังก์ชัน Fetch แทนที่ google.script.run
    async function apiCall(payload) {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' } // ป้องกัน CORS preflight
        });
        return await response.json();
      } catch (error) {
        throw new Error('Network response was not ok');
      }
    }

    async function handleAuth() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const username = document.getElementById('username').value.trim();
      const otp = document.getElementById('otp-input').value.trim();
      const btn = document.getElementById('authBtn');

      if(!email || !password) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกอีเมลและรหัสผ่าน', 'warning');
      if(!isLogin && !username) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อผู้ใช้งาน', 'warning');

      btn.disabled = true; btn.innerHTML = `<span class="animate-pulse">กำลังดำเนินการ...</span>`;

      try {
        if (isLogin && step === 1) {
          const res = await apiCall({ action: 'loginStep1', email: email, password: password });
          btn.disabled = false;
          if (res.status === 'success') {
            step = 2;
            document.getElementById('step1-inputs').classList.add('hidden');
            document.getElementById('step2-inputs').classList.remove('hidden');
            document.getElementById('toggleZone').classList.add('hidden');
            btn.innerText = 'ยืนยันเพื่อเข้าสู่ระบบ';
            document.getElementById('step2-message').innerText = (res.method === 'email') ? 'ระบบส่งรหัส OTP ไปที่อีเมลแล้ว' : 'เปิดแอป Google Authenticator แล้วกรอกรหัส';
            setTimeout(() => document.getElementById('otp-input').focus(), 100);
          } else { btn.innerText = 'เข้าสู่ระบบ'; Swal.fire('ผิดพลาด', res.message, 'error'); }
          
        } else if (isLogin && step === 2) {
          if(!otp) { btn.disabled = false; btn.innerText = 'ยืนยันเพื่อเข้าสู่ระบบ'; return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัส', 'warning'); }
          
          const res = await apiCall({ action: 'verifyLoginStep2', email: email, otp: otp });
          if (res.status === 'success') {
            localStorage.setItem('user_email', email); localStorage.setItem('user_name', res.username);
            // เปลี่ยนเส้นทางแบบเว็บปกติ
            window.location.href = "cms.html";
          } else { btn.disabled = false; btn.innerText = 'ยืนยันเพื่อเข้าสู่ระบบ'; Swal.fire('ผิดพลาด', res.message, 'error'); }
          
        } else {
          const authMethod = document.querySelector('input[name="auth_method"]:checked').value;
          const res = await apiCall({ action: 'registerUser', email: email, password: password, username: username, authMethod: authMethod });
          
          btn.disabled = false; btn.innerText = 'ลงทะเบียน';
          if(res.status === 'success') {
             if(res.authMethod === 'authenticator') {
                document.getElementById('mainCard').classList.add('hidden');
                document.getElementById('qrImage').src = res.qrUrl;
                document.getElementById('secretText').innerText = res.secretKey;
                document.getElementById('qrCard').classList.remove('hidden');
             } else { Swal.fire('สำเร็จ', res.message, 'success').then(()=> location.reload()); }
          } else { Swal.fire('ผิดพลาด', res.message, 'error'); }
        }
      } catch (err) {
        btn.disabled = false; 
        btn.innerText = (isLogin && step === 1) ? 'เข้าสู่ระบบ' : ((isLogin && step === 2) ? 'ยืนยันเพื่อเข้าสู่ระบบ' : 'ลงทะเบียน');
        Swal.fire('ข้อผิดพลาดเครือข่าย', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
      }
    }
  </script>
</body>
</html>
